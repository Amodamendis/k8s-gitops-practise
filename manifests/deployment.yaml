apiVersion: apps/v1  
kind: Deployment
metadata:
  name: lms-static
  namespace: lms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lms-static
  template:
    metadata:
      labels:
        app: lms-static
    spec:
      containers:
      - name: lms-static
        image: amodamendis/lms-app:latest
        ports:
        - containerPort: 80